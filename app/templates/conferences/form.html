{% extends "base.html" %}
{% block title %}{{ 'Edit' if conference else 'New' }} Conference{% endblock %}
{% block content %}
<nav aria-label="breadcrumb" class="mb-3">
  <ol class="breadcrumb">
    <li class="breadcrumb-item"><a href="/conferences">Conferences</a></li>
    <li class="breadcrumb-item active">{{ 'Edit' if conference else 'New' }}</li>
  </ol>
</nav>
<div class="card" style="max-width:560px">
  <div class="card-body">
    <h5 class="fw-bold mb-4">{{ 'Edit Conference' if conference else 'New Conference' }}</h5>
    <form method="post" action="{{ action }}">
      <div class="mb-3">
        <label class="form-label small fw-semibold">Name *</label>
        <input type="text" name="name" class="form-control" required
               value="{{ conference.name if conference else '' }}">
      </div>
      <div class="row g-3">
        <div class="col-md-4">
          <label class="form-label small fw-semibold">Abbreviation *</label>
          <input type="text" name="abbreviation" class="form-control" required
                 value="{{ conference.abbreviation if conference else '' }}" placeholder="ICML">
        </div>
        <div class="col-md-4">
          <label class="form-label small fw-semibold">CORE Rank</label>
          <select name="core_rank" class="form-select">
            <option value="">—</option>
            {% for r in core_ranks %}
            <option value="{{ r }}" {% if conference and conference.core_rank == r %}selected{% endif %}>{{ r }}</option>
            {% endfor %}
          </select>
        </div>
      </div>
      <div class="mb-3 mt-3">
        <label class="form-label small fw-semibold">Website</label>
        <input type="url" name="website" class="form-control"
               value="{{ conference.website or '' }}">
      </div>
      <div class="mb-4">
        <label class="form-label small fw-semibold">WikiCFP Series ID</label>
        <input type="text" name="wikicfp_series_id" class="form-control"
               value="{{ conference.wikicfp_series_id or '' }}">
      </div>
      <div class="d-flex gap-2">
        <button type="submit" class="btn btn-primary">Save</button>
        <a href="/conferences{% if conference %}/{{ conference.id }}{% endif %}" class="btn btn-outline-secondary">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
