{% extends "base.html" %}
{% block title %}{{ 'Edit' if affiliation else 'New' }} Affiliation{% endblock %}
{% block content %}
<nav aria-label="breadcrumb" class="mb-3">
  <ol class="breadcrumb">
    <li class="breadcrumb-item"><a href="/affiliations">Affiliations</a></li>
    <li class="breadcrumb-item active">{{ 'Edit' if affiliation else 'New' }}</li>
  </ol>
</nav>

<div class="card" style="max-width:600px">
  <div class="card-body">
    <h5 class="card-title fw-bold mb-4">{{ 'Edit' if affiliation else 'New Affiliation' }}</h5>
    <form method="post" action="{{ action }}">
      <div class="mb-3">
        <label class="form-label small fw-semibold">Name *</label>
        <input type="text" name="name" class="form-control" required
               value="{{ affiliation.name if affiliation else '' }}">
      </div>
      <div class="row">
        <div class="col-md-4 mb-3">
          <label class="form-label small fw-semibold">Sigle</label>
          <input type="text" name="sigle" class="form-control"
                 value="{{ affiliation.sigle or '' }}" placeholder="e.g. MIT">
        </div>
        <div class="col-md-4 mb-3">
          <label class="form-label small fw-semibold">Country</label>
          <input type="text" name="country" class="form-control"
                 value="{{ affiliation.country or '' }}">
        </div>
        <div class="col-md-4 mb-3">
          <label class="form-label small fw-semibold">Color</label>
          <input type="color" name="color" class="form-control form-control-color w-100"
                 value="{{ affiliation.color or '#1d3a6e' }}">
        </div>
      </div>
      <div class="mb-3">
        <label class="form-label small fw-semibold">Website</label>
        <input type="url" name="website" class="form-control"
               value="{{ affiliation.website or '' }}">
      </div>
      <div class="mb-4">
        <label class="form-label small fw-semibold">Description</label>
        <textarea name="description" class="form-control" rows="3">{{ affiliation.description or '' }}</textarea>
      </div>
      <div class="d-flex gap-2">
        <button type="submit" class="btn btn-primary">Save</button>
        <a href="/affiliations{% if affiliation %}/{{ affiliation.id }}{% endif %}" class="btn btn-outline-secondary">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
