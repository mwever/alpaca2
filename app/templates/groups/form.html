{% extends "base.html" %}
{% block title %}{{ 'Edit' if group else 'New' }} Group{% endblock %}
{% block content %}
<nav aria-label="breadcrumb" class="mb-3">
  <ol class="breadcrumb">
    <li class="breadcrumb-item"><a href="/groups">Groups</a></li>
    <li class="breadcrumb-item active">{{ 'Edit' if group else 'New' }}</li>
  </ol>
</nav>
<div class="card" style="max-width:480px">
  <div class="card-body">
    <h5 class="fw-bold mb-4">{{ 'Edit Group' if group else 'New Research Group' }}</h5>
    <form method="post" action="{{ action }}">
      <div class="mb-3">
        <label class="form-label small fw-semibold">Name *</label>
        <input type="text" name="name" class="form-control" required
               value="{{ group.name if group else '' }}">
      </div>
      <div class="mb-3">
        <label class="form-label small fw-semibold">Description</label>
        <textarea name="description" class="form-control" rows="3">{{ group.description or '' if group else '' }}</textarea>
      </div>
      <div class="mb-4">
        <label class="form-label small fw-semibold">Parent Group</label>
        <select name="parent_group_id" class="form-select">
          <option value="">— none (top-level) —</option>
          {% for g in all_groups %}
          <option value="{{ g.id }}" {% if group and group.parent_group_id == g.id %}selected{% endif %}>{{ g.name }}</option>
          {% endfor %}
        </select>
      </div>
      <div class="d-flex gap-2">
        <button type="submit" class="btn btn-primary">Save</button>
        <a href="/groups{% if group %}/{{ group.id }}{% endif %}" class="btn btn-outline-secondary">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
